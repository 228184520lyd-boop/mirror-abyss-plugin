<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="style.css"><style>
:root{--SmartThemeBlurTintColor:#eef3f7;--SmartThemeChatTintColor:#f7fafc;--SmartThemeBodyColor:#163a53;--SmartThemeQuoteColor:#2b88b8}html,body{margin:0;background:#e8eef2;font-family:system-ui,-apple-system,"PingFang SC",sans-serif;color:#163a53}.demo-chat{padding:14px 10px 16px;background:#fff}.demo-message{padding:12px;border-radius:12px;background:#f2f4f6;line-height:1.7}.demo-space{height:12px}.ma11-workspace{position:relative!important;inset:auto!important;width:100%;height:740px!important;padding:0!important;background:transparent!important;backdrop-filter:none!important}.ma11-shell{height:100%!important}.ma11-main{background:#edf2f5}.ma11-icon-button{font-size:18px}
</style></head><body>

<div class="ma11-message-panel"><div class="ma11-message-bar success"><span class="ma11-message-state-dot"></span><button class="ma11-message-open"><b>镜渊</b><span>已完成</span></button><span class="ma11-message-count">4 对象</span><button class="ma11-message-expand">⌄</button></div></div></div>
<div class="demo-space"></div>

mall></div><div class="ma11-stage-step success"><span></span><b>总结</b><small>成功</small></div><div class="ma11-stage-step success"><span></span><b>世界书</b><small>成功</small></div></div></section><nav class="ma11-dashboard-links"><button><i>▦</i><span><b>对象</b><small>查看状态表</small></span></button><button><i>≡</i><span><b>总结</b><small>近期与长期</small></span></button><button><i>▤</i><span><b>世界书</b><small>发布与召回</small></span></button></nav><section class="ma11-card ma11-task-card"><header><b>任务</b><span>当前空闲</span></header><div class="ma11-task-list"><p class="ma11-empty">暂无最近任务。</p></div></section></main></section></div></div>
