<section id="ma11-settings-root" class="ma11-settings-root ma11-settings-panel" aria-labelledby="ma11-settings-title">
  <header class="ma11-settings-heading">
    <div class="ma11-settings-title">
      <span class="ma11-settings-mark" aria-hidden="true">渊</span>
      <span><b id="ma11-settings-title">镜渊</b><small>长期叙事记忆</small></span>
    </div>
    <label class="ma11-quick-switch">
      <input type="checkbox" data-ma11-quick-setting="enabled">
      <span>启用</span>
    </label>
  </header>
  <div class="ma11-settings-content">
    <div class="ma11-settings-overview">
      <div>
        <b>开箱即用</b>
        <p>默认规则、对象表格、分层总结与世界书发布已经配置；遇到异常时再进入诊断。</p>
      </div>
      <span class="ma11-badge success">标准配置</span>
    </div>
    <div class="ma11-settings-shortcuts">
      <button class="menu_button ma11-settings-primary" type="button" data-ma11-action="open">
        <i class="fa-solid fa-arrow-up-right-from-square" aria-hidden="true"></i>
        <span>打开工作区</span>
      </button>
      <button class="menu_button" type="button" data-ma11-action="diagnostics">
        <i class="fa-solid fa-stethoscope" aria-hidden="true"></i>
        <span>运行诊断</span>
      </button>
    </div>
  </div>
</section>
